name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: checkout stepfiles
        uses: actions/checkout@v4
        with:
          repository: kasper573/stepfiles
          ssh-key: ${{ secrets.STEPFILES_DEPLOY_KEY }}
          path: assets/stepfiles
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binaryen libasound2-dev libwayland-dev libxkbcommon-dev
      - name: resolve wasm-bindgen version from Cargo.lock
        id: wasm-bindgen
        run: echo "version=$(cargo metadata --format-version 1 --locked | jq -r '.packages[] | select(.name == "wasm-bindgen") | .version')" >> "$GITHUB_OUTPUT"
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@${{ steps.wasm-bindgen.outputs.version }}
      - name: build site
        run: cargo run --bin serve -- --emit dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: windows-latest
            platform: windows-x86_64
          - os: macos-latest
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install build tools (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm libasound2-dev libwayland-dev libxkbcommon-dev
      - name: install build tools (macos)
        if: runner.os == 'macOS'
        run: brew install nasm
      - name: install prebuilt ffmpeg (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sSfL -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-lgpl-shared-8.1.zip
          unzip -q ffmpeg.zip -d ffmpeg-prebuilt
          echo "FFMPEG_DIR=$(cygpath -w "$PWD"/ffmpeg-prebuilt/ffmpeg-n8.1-latest-win64-lgpl-shared-8.1)" >> "$GITHUB_ENV"
      - name: build
        run: cargo build --release --bin rhythm
      - name: package
        shell: bash
        run: |
          mkdir -p staging
          cp -r assets staging/assets
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/rhythm.exe staging/
            cp "$FFMPEG_DIR"/bin/*.dll staging/
          else
            cp target/release/rhythm staging/
          fi
          cd staging
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "../rhythm-${{ matrix.platform }}.zip" .
          else
            zip -qr "../rhythm-${{ matrix.platform }}.zip" .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: rhythm-${{ matrix.platform }}
          path: rhythm-${{ matrix.platform }}.zip
          compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.run_number }}" artifacts/*.zip \
            --title "rhythm v${{ github.run_number }}" \
            --notes "Automated build of commit ${{ github.sha }}. Each archive contains the game and its built-in assets; add your stepfile library under assets/stepfiles/."
