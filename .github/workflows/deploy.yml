name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: checkout stepfiles
        uses: actions/checkout@v4
        with:
          repository: kasper573/stepfiles
          ssh-key: ${{ secrets.STEPFILES_DEPLOY_KEY }}
          path: assets/stepfiles
      # The pinned web toolchain first, stable second so stable stays the
      # default; the serve binary selects the web toolchain explicitly.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01
          components: rust-src
          targets: wasm32-unknown-emscripten
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The emsdk version whose emscripten matches the Godot 4.7 web export
      # templates; the build step sources its environment.
      - name: install emsdk
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk
          emsdk/emsdk install 3.1.74
          emsdk/emsdk activate 3.1.74
      - name: install godot
        run: |
          release=https://github.com/godotengine/godot/releases/download/4.7-stable
          curl -sSfL -o godot.zip "$release/Godot_v4.7-stable_linux.x86_64.zip"
          unzip -q godot.zip
          echo "GODOT_BIN=$PWD/Godot_v4.7-stable_linux.x86_64" >> "$GITHUB_ENV"
          curl -sSfL -o templates.tpz "$release/Godot_v4.7-stable_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p ~/.local/share/godot/export_templates
          mv templates ~/.local/share/godot/export_templates/4.7.stable
      - name: build site
        run: |
          source emsdk/emsdk_env.sh
          cargo run -p tools -- serve --emit dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            preset: Linux
            out: target/export/linux/rhythm.x86_64
          - os: windows-latest
            platform: windows-x86_64
            preset: Windows
            out: target/export/windows/rhythm.exe
          - os: macos-latest
            platform: macos-arm64
            preset: macOS
            out: target/export/macos/rhythm.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install build tools (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm
      - name: install build tools (macos)
        if: runner.os == 'macOS'
        run: brew install nasm
      # The extension links these dynamically on Windows. Dependent DLLs
      # resolve from the extension's own directory: the export step copies
      # them beside the built libraries so the editor can load it, and the
      # packaged game ships them beside the executable.
      - name: install prebuilt ffmpeg (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sSfL -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-lgpl-shared-8.1.zip
          unzip -q ffmpeg.zip -d ffmpeg-prebuilt
          echo "FFMPEG_DIR=$(cygpath -w "$PWD"/ffmpeg-prebuilt/ffmpeg-n8.1-latest-win64-lgpl-shared-8.1)" >> "$GITHUB_ENV"
      - name: install godot
        shell: bash
        run: |
          release=https://github.com/godotengine/godot/releases/download/4.7-stable
          case "$RUNNER_OS" in
            Linux)
              curl -sSfL -o godot.zip "$release/Godot_v4.7-stable_linux.x86_64.zip"
              unzip -q godot.zip
              echo "GODOT_BIN=$PWD/Godot_v4.7-stable_linux.x86_64" >> "$GITHUB_ENV"
              templates=~/.local/share/godot/export_templates
              ;;
            Windows)
              curl -sSfL -o godot.zip "$release/Godot_v4.7-stable_win64.exe.zip"
              unzip -q godot.zip
              echo "GODOT_BIN=$PWD/Godot_v4.7-stable_win64_console.exe" >> "$GITHUB_ENV"
              templates="$APPDATA/Godot/export_templates"
              ;;
            macOS)
              curl -sSfL -o godot.zip "$release/Godot_v4.7-stable_macos.universal.zip"
              unzip -q godot.zip
              echo "GODOT_BIN=$PWD/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"
              templates="$HOME/Library/Application Support/Godot/export_templates"
              ;;
          esac
          curl -sSfL -o templates.tpz "$release/Godot_v4.7-stable_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p "$templates"
          mv templates "$templates/4.7.stable"
      # The editor (which runs the import below) loads the debug library;
      # the exported game ships the release one.
      - name: build
        run: |
          cargo build --lib
          cargo build --release --lib
      - name: export
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "$FFMPEG_DIR"/bin/*.dll target/debug/
            cp "$FFMPEG_DIR"/bin/*.dll target/release/
          fi
          cargo run -p tools -- export "${{ matrix.preset }}" "${{ matrix.out }}"
      - name: package
        shell: bash
        run: |
          mkdir -p staging
          cp -r assets staging/assets
          case "$RUNNER_OS" in
            Linux)
              cp target/export/linux/* staging/
              ;;
            Windows)
              cp target/export/windows/* staging/
              cp "$FFMPEG_DIR"/bin/*.dll staging/
              ;;
            macOS)
              unzip -q target/export/macos/rhythm.zip -d staging
              ;;
          esac
          cd staging
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "../rhythm-${{ matrix.platform }}.zip" .
          else
            zip -qry "../rhythm-${{ matrix.platform }}.zip" .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: rhythm-${{ matrix.platform }}
          path: rhythm-${{ matrix.platform }}.zip
          compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.run_number }}" artifacts/*.zip \
            --title "rhythm v${{ github.run_number }}" \
            --notes "Automated build of commit ${{ github.sha }}. Each archive contains the game and its built-in assets; add your stepfile library under assets/stepfiles/."
