<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Rhythm</title>
    <link rel="icon" href="data:," />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #06070f;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        display: block;
        outline: none;
        touch-action: none;
      }
      #start {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #06070f;
        color: #e8e8f0;
        font-family: system-ui, sans-serif;
        z-index: 1;
      }
      #start button {
        font-size: 2rem;
        padding: 1rem 3rem;
        border: 1px solid #4a5a8a;
        border-radius: 0.5rem;
        background: #101528;
        color: inherit;
        cursor: pointer;
      }
      #start button:hover {
        background: #1a2140;
      }
    </style>
  </head>
  <body>
    <div id="start"><button>▶ Play</button></div>
    <script type="module">
      import init from "./rhythm.js";

      // The wasm download starts immediately; the game itself only boots
      // from the click below, which is the user gesture browsers require
      // before audio may play.
      const wasm = fetch("./rhythm_bg.wasm");
      const overlay = document.getElementById("start");
      const button = overlay.querySelector("button");

      button.addEventListener("click", async () => {
        button.textContent = "Loading…";
        button.disabled = true;
        // The game inserts its canvas when it has fetched its assets and
        // started up; keep the overlay up until then.
        new MutationObserver((_, observer) => {
          if (document.querySelector("canvas")) {
            overlay.remove();
            observer.disconnect();
          }
        }).observe(document.body, { childList: true, subtree: true });
        await init({ module_or_path: wasm });
      });

      // Touch bindings, synthesized as the keyboard events the game
      // already understands. Every touch acts independently: a swipe
      // presses its direction's arrow the moment it crosses the threshold
      // and releases it when the finger lifts — so simultaneous swipes
      // play jumps, and a swipe kept down sustains holds. A short
      // stationary tap is Select; exactly two touches held stationary for
      // a second are Cancel.
      const SWIPE_MIN_PX = 30;
      const CANCEL_HOLD_MS = 1000;
      const touches = new Map();
      let cancelTimer = null;

      function keyEvent(type, code) {
        const canvas = document.querySelector("canvas");
        if (!canvas) return;
        const options = { code, key: code, bubbles: true, cancelable: true };
        canvas.dispatchEvent(new KeyboardEvent(type, options));
      }

      function pulseKey(code) {
        keyEvent("keydown", code);
        setTimeout(() => keyEvent("keyup", code), 60);
      }

      function stationary() {
        return [...touches.values()].filter((t) => !t.arrow && !t.consumed);
      }

      function swipeArrow(tracked, touch) {
        const dx = touch.clientX - tracked.x;
        const dy = touch.clientY - tracked.y;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_MIN_PX) return null;
        return Math.abs(dx) > Math.abs(dy)
          ? dx > 0
            ? "ArrowRight"
            : "ArrowLeft"
          : dy > 0
            ? "ArrowDown"
            : "ArrowUp";
      }

      // The cancel gesture arms whenever exactly two touches rest
      // unresolved, and fires if they are still resting when the timer
      // runs out; any change in the touch picture re-evaluates it.
      function updateCancelTimer() {
        const armable = touches.size === 2 && stationary().length === 2;
        if (!armable && cancelTimer !== null) {
          clearTimeout(cancelTimer);
          cancelTimer = null;
        } else if (armable && cancelTimer === null) {
          cancelTimer = setTimeout(() => {
            cancelTimer = null;
            const resting = stationary();
            if (touches.size === 2 && resting.length === 2) {
              resting.forEach((t) => (t.consumed = true));
              pulseKey("Escape");
            }
          }, CANCEL_HOLD_MS);
        }
      }

      document.addEventListener(
        "touchstart",
        (event) => {
          if (!document.querySelector("canvas")) return;
          event.preventDefault();
          for (const touch of event.changedTouches) {
            touches.set(touch.identifier, {
              x: touch.clientX,
              y: touch.clientY,
              arrow: null,
              consumed: false,
            });
          }
          updateCancelTimer();
        },
        { passive: false },
      );

      document.addEventListener(
        "touchmove",
        (event) => {
          if (!document.querySelector("canvas")) return;
          event.preventDefault();
          for (const touch of event.changedTouches) {
            const tracked = touches.get(touch.identifier);
            if (!tracked || tracked.arrow || tracked.consumed) continue;
            const arrow = swipeArrow(tracked, touch);
            if (!arrow) continue;
            tracked.arrow = arrow;
            keyEvent("keydown", arrow);
          }
          updateCancelTimer();
        },
        { passive: false },
      );

      for (const kind of ["touchend", "touchcancel"]) {
        document.addEventListener(
          kind,
          (event) => {
            if (!document.querySelector("canvas")) return;
            event.preventDefault();
            for (const touch of event.changedTouches) {
              const tracked = touches.get(touch.identifier);
              touches.delete(touch.identifier);
              if (!tracked || tracked.consumed) continue;
              if (tracked.arrow) {
                keyEvent("keyup", tracked.arrow);
              } else if (kind === "touchend") {
                // A swipe so fast the browser coalesced its movement into
                // the end event still counts; anything shorter is a tap.
                const arrow = swipeArrow(tracked, touch);
                pulseKey(arrow ?? "Enter");
              }
            }
            updateCancelTimer();
          },
          { passive: false },
        );
      }
    </script>
  </body>
</html>
